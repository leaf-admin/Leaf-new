# Redis Configuration for KYC Service

# Redis Streams Configuration
streams:
  kyc_verification: "kyc:verification"
  kyc_results: "kyc:results"
  kyc_analytics: "kyc:analytics"

# Redis Connection
host: "localhost"
port: 6379
db: 0
password: null
max_connections: 20

# Stream Consumer Groups
consumer_groups:
  kyc_verification:
    group_name: "kyc_verification_group"
    consumer_name: "kyc_worker_1"
  
  kyc_results:
    group_name: "kyc_results_group"
    consumer_name: "kyc_result_worker_1"

# Stream Settings
stream_settings:
  maxlen: 10000
  block_time: 1000  # milliseconds
  count: 1

