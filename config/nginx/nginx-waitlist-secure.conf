# ===================================
# 🛡️ CONFIGURAÇÃO NGINX SEGURA PARA WAITLIST
# ===================================
# Rate limiting MUITO restritivo para /api/waitlist/landing
# Proteção contra DDoS e spam

# Zone específica para waitlist - MUITO RESTRITIVA
# 3 requisições por IP por hora (3600 segundos)
limit_req_zone $binary_remote_addr zone=waitlist:10m rate=3r/h;

# Zone para API geral (menos restritiva)
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

# Zone para WebSocket
limit_req_zone $binary_remote_addr zone=websocket:10m rate=200r/m;

# ===================================
# 🔐 HTTPS PRINCIPAL  
# ===================================
server {
    listen 443 ssl http2;
    server_name leaf.app.br www.leaf.app.br;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/leaf.app.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leaf.app.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # ===================================
    # 🛡️ WAITLIST ENDPOINT - PROTEÇÃO MÁXIMA
    # ===================================
    location /api/waitlist/landing {
        # Rate limiting MUITO restritivo: 3 requisições por IP por hora
        limit_req zone=waitlist burst=1 nodelay;
        limit_req_status 429;
        
        # Limitar tamanho do body (proteção contra payload grande)
        client_max_body_size 1k;
        
        # Timeout curto (proteção contra slowloris)
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        # Proxy para backend
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        
        # CORS - Apenas origem permitida
        add_header Access-Control-Allow-Origin "https://leaf.app.br" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://leaf.app.br";
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # Bloquear métodos não permitidos
        if ($request_method !~ ^(POST|OPTIONS)$) {
            return 405;
        }
    }
    
    # ===================================
    # 🔌 API ROUTES GERAIS (/api/*)
    # ===================================
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS
        add_header Access-Control-Allow-Origin "https://leaf.app.br" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://leaf.app.br";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
    
    # ===================================
    # 📡 WEBSOCKET ROUTES
    # ===================================
    location /socket.io/ {
        limit_req zone=websocket burst=200 nodelay;
        
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
    
    # Logs
    access_log /var/log/nginx/leaf-waitlist-access.log;
    error_log /var/log/nginx/leaf-waitlist-error.log warn;
}



