# ===================================
# 🍃 LEAF - CONFIGURAÇÃO NGINX COMPLETA  
# ===================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
    use epoll;
    multi_accept on;
}

http {
    # ===================================
    # 🔧 CONFIGURAÇÕES BÁSICAS
    # ===================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # ===================================
    # 📝 LOGS
    # ===================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;
    
    # ===================================
    # 🗜️ GZIP COMPRESSION
    # ===================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
    
    # ===================================
    # 🔄 UPSTREAMS
    # ===================================
    upstream api_backend {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    upstream websocket_backend {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    # ===================================
    # ⚡ RATE LIMITING
    # ===================================
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=websocket:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=website:10m rate=30r/m;

    # ===================================
    # 🔄 HTTP -> HTTPS REDIRECT
    # ===================================
    server {
        listen 80;
        server_name leaf.app.br www.leaf.app.br 216.238.107.59;
        
        # Redirecionar para HTTPS
        return 301 https://$server_name$request_uri;
    }

    # ===================================
    # 🔐 HTTPS PRINCIPAL  
    # ===================================
    server {
        listen 443 ssl http2;
        server_name leaf.app.br www.leaf.app.br 216.238.107.59;
        
        # ===================================
        # 🔐 SSL CONFIGURATION (Let's Encrypt)
        # ===================================
        ssl_certificate /etc/letsencrypt/live/leaf.app.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/leaf.app.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        
        # ===================================
        # 🛡️ SECURITY HEADERS
        # ===================================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self'" always;
        
        # ===================================
        # 📡 WEBSOCKET ROUTES (/socket.io/)
        # ===================================
        location /socket.io/ {
            limit_req zone=websocket burst=200 nodelay;
            
            proxy_pass http://websocket_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 10s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            
            # WebSocket specific
            proxy_buffering off;
            proxy_redirect off;
            
            # CORS for WebSocket (restritivo)
            add_header Access-Control-Allow-Origin "https://leaf.app.br" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
        }
        
        # ===================================
        # 🔌 API ROUTES (/api/)
        # ===================================
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # CORS for API
            add_header Access-Control-Allow-Origin "https://leaf.app.br" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://leaf.app.br";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization";
                add_header Access-Control-Allow-Credentials "true";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }
        
        # ===================================
        # 📊 METRICS & HEALTH (/metrics, /health)
        # ===================================
        location ~ ^/(metrics|health|redis) {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # ===================================
        # 🌐 WEBSITE INSTITUCIONAL (/)
        # ===================================
        location / {
            limit_req zone=website burst=30 nodelay;
            
            root /var/www/leaf-website;
            index index.html;
            try_files $uri $uri.html $uri/ =404;
            
            # Cache para arquivos estáticos
            location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
            
            # Cache para HTML (menor tempo)
            location ~* \.html$ {
                expires 1h;
                add_header Cache-Control "public";
            }
        }
        
        # ===================================
        # 🗂️ ARQUIVOS ESPECIAIS
        # ===================================
        location = /favicon.ico {
            root /var/www/leaf-website;
            access_log off;
            log_not_found off;
        }
        
        location = /robots.txt {
            root /var/www/leaf-website;
            access_log off;
            log_not_found off;
        }
        
        # ===================================
        # 🚫 SEGURANÇA - BLOQUEAR ARQUIVOS SENSÍVEIS
        # ===================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        location ~ \.(log|conf|env)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # ===================================
        # 📝 LOGS ESPECÍFICOS
        # ===================================
        access_log /var/log/nginx/leaf-access.log;
        error_log /var/log/nginx/leaf-error.log warn;
        
        # ===================================
        # 🔧 CONFIGURAÇÕES GERAIS
        # ===================================
        client_max_body_size 10M;
    }
}
