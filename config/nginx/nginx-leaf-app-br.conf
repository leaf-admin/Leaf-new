# ===================================
# 🍃 LEAF - CONFIGURAÇÃO NGINX PARA leaf.app.br
# ===================================
# 
# Esta configuração roteia:
# 1. 🔌 API Backend (/api/*) -> localhost:3001
# 2. 📡 WebSocket (/socket.io/*) -> localhost:3001
# 3. 🌐 Website estático (/) -> Cloudflare (não servido aqui)
#
# IMPORTANTE: A landing page está na Cloudflare, mas as APIs precisam ser roteadas aqui

# Upstream para API Backend (porta 3001)
upstream api_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Upstream para WebSocket (porta 3001)
upstream websocket_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Rate Limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=websocket:10m rate=200r/m;

# ===================================
# 🔄 HTTP -> HTTPS REDIRECT
# ===================================
server {
    listen 80;
    server_name leaf.app.br www.leaf.app.br api.leaf.app.br;
    
    # Redirecionar para HTTPS
    return 301 https://$server_name$request_uri;
}

    # ===================================
    # 🔐 HTTPS PRINCIPAL  
    # ===================================
    server {
    listen 443 ssl http2;
    server_name leaf.app.br www.leaf.app.br;
    
    # ===================================
    # 🔐 SSL CONFIGURATION
    # ===================================
    ssl_certificate /etc/letsencrypt/live/leaf.app.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leaf.app.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    
    # ===================================
    # 🛡️ SECURITY HEADERS
    # ===================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # ===================================
    # 🔌 API ROUTES (/api/*) - CRÍTICO PARA WAITLIST
    # ===================================
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        
        # Proxy para backend Node.js na porta 3001
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS - Permitir requisições da Cloudflare (landing page)
        add_header Access-Control-Allow-Origin "https://leaf.app.br" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://leaf.app.br";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
    
    # ===================================
    # 📡 WEBSOCKET ROUTES (/socket.io/*)
    # ===================================
    location /socket.io/ {
        limit_req zone=websocket burst=200 nodelay;
        
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # WebSocket timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
    
    # ===================================
    # 📊 METRICS & HEALTH
    # ===================================
    location ~ ^/(metrics|health) {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ===================================
    # 🌐 WEBSITE (Cloudflare serve, mas podemos ter fallback)
    # ===================================
    # A landing page está na Cloudflare, então não servimos arquivos estáticos aqui
    # Mas podemos ter um fallback caso necessário
    location / {
        # Se quiser servir arquivos estáticos localmente, descomente:
        # root /var/www/leaf-website;
        # index index.html;
        # try_files $uri $uri/ =404;
        
        # Por enquanto, retornar 404 ou redirecionar
        return 404;
    }
    
    # ===================================
    # 📝 LOGS
    # ===================================
    access_log /var/log/nginx/leaf-app-br-access.log;
    error_log /var/log/nginx/leaf-app-br-error.log warn;
    
    # ===================================
    # 🔧 CONFIGURAÇÕES GERAIS
    # ===================================
    client_max_body_size 10M;
    keepalive_timeout 65;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss;
}

