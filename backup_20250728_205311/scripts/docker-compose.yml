version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-leaf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - C:/Users/izaak/Downloads/redis-config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    environment:
      - REDIS_REPLICATION_MODE=master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: leaf-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - tools

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: leaf-network 