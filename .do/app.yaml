name: leaf-new-backend
region: nyc

services:
  - name: leaf-websocket-backend
    source_dir: leaf-websocket-backend
    github:
      branch: main
      deploy_on_push: true
      repo: leaf-admin/Leaf-new
    dockerfile_path: Dockerfile
    http_port: 3001
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    run_command: node server.js
    health_check:
      http_path: /health/liveness
      initial_delay_seconds: 30
      period_seconds: 20
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: HOST
        scope: RUN_TIME
        value: 0.0.0.0
      - key: PORT
        scope: RUN_TIME
        value: "3001"
      - key: KYC_USE_VPS
        scope: RUN_TIME
        value: "false"
      - key: ENABLE_PLACES_CACHE
        scope: RUN_TIME
        value: "false"
      - key: SOCKET_IO_ADAPTER
        scope: RUN_TIME
        value: redis
      - key: FIREBASE_DATABASE_URL
        scope: RUN_TIME
        value: https://leaf-reactnative-default-rtdb.firebaseio.com
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        scope: RUN_TIME
        type: SECRET
        value: <SET_IN_DO_FIREBASE_SERVICE_ACCOUNT_JSON>
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: <SET_IN_DO_JWT_SECRET>
      - key: WOOVI_APP_ID
        scope: RUN_TIME
        type: SECRET
        value: <SET_IN_DO_WOOVI_APP_ID>
      - key: WOOVI_API_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: <SET_IN_DO_WOOVI_API_TOKEN>
      - key: WOOVI_ENVIRONMENT
        scope: RUN_TIME
        value: sandbox
      - key: WOOVI_BASE_URL
        scope: RUN_TIME
        value: https://api.woovi-sandbox.com/api/v1
      - key: REDIS_HOST
        scope: RUN_TIME
        value: <SET_IN_DO_REDIS_HOST>
      - key: REDIS_PORT
        scope: RUN_TIME
        value: "6379"
      - key: REDIS_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: <SET_IN_DO_REDIS_PASSWORD>
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
        value: <SET_IN_DO_REDIS_URL>
      - key: REDIS_DB
        scope: RUN_TIME
        value: "0"
