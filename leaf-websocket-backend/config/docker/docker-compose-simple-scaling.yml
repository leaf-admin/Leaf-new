      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - REDIS_URL=redis://127.0.0.1:6379
    ports:
      - "3003:3003"
    network_mode: host
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # WebSocket Instance 4 (Auto-scaling)
