# Docker Compose para Leaf System - VPS Vultr 8GB
# Suporte para 500k+ usuários simultâneos

version: '3.8'

services:
  # Redis Cluster - 2GB total
  redis-master:
    image: redis:7-alpine
    container_name: leaf-redis-master
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - leaf-network
    restart: unless-stopped
    mem_limit: 1gb
    cpus: 0.5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-replica-1:
    image: redis:7-alpine
    container_name: leaf-redis-replica-1
    command: redis-server --slaveof redis-master 6379 --maxmemory 0.5gb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis-replica-1-data:/data
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    mem_limit: 0.5gb
    cpus: 0.25

  redis-replica-2:
    image: redis:7-alpine
    container_name: leaf-redis-replica-2
    command: redis-server --slaveof redis-master 6379 --maxmemory 0.5gb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - redis-replica-2-data:/data
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    mem_limit: 0.5gb
    cpus: 0.25

  # WebSocket Servers - 4GB total
  websocket-1:
    build: .
    container_name: leaf-websocket-1
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INSTANCE_ID=websocket_1
      - CLUSTER_MODE=true
      - REDIS_URL=redis://redis-master:6379
      - REDIS_REPLICA_1=redis://redis-replica-1:6379
      - REDIS_REPLICA_2=redis://redis-replica-2:6379
    ports:
      - "3001:3001"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    mem_limit: 1gb
    cpus: 0.75
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket-2:
    build: .
    container_name: leaf-websocket-2
    environment:
      - NODE_ENV=production
      - PORT=3002
      - INSTANCE_ID=websocket_2
      - CLUSTER_MODE=true
      - REDIS_URL=redis://redis-master:6379
      - REDIS_REPLICA_1=redis://redis-replica-1:6379
      - REDIS_REPLICA_2=redis://redis-replica-2:6379
    ports:
      - "3002:3002"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    mem_limit: 1gb
    cpus: 0.75
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket-3:
    build: .
    container_name: leaf-websocket-3
    environment:
      - NODE_ENV=production
      - PORT=3003
      - INSTANCE_ID=websocket_3
      - CLUSTER_MODE=true
      - REDIS_URL=redis://redis-master:6379
      - REDIS_REPLICA_1=redis://redis-replica-1:6379
      - REDIS_REPLICA_2=redis://redis-replica-2:6379
    ports:
      - "3003:3003"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    mem_limit: 1gb
    cpus: 0.75
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket-4:
    build: .
    container_name: leaf-websocket-4
    environment:
      - NODE_ENV=production
      - PORT=3004
      - INSTANCE_ID=websocket_4
      - CLUSTER_MODE=true
      - REDIS_URL=redis://redis-master:6379
      - REDIS_REPLICA_1=redis://redis-replica-1:6379
      - REDIS_REPLICA_2=redis://redis-replica-2:6379
    ports:
      - "3004:3004"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    mem_limit: 1gb
    cpus: 0.75
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Load Balancer - 0.5GB
  nginx:
    image: nginx:alpine
    container_name: leaf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-vultr.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      - websocket-1
      - websocket-2
      - websocket-3
      - websocket-4
    mem_limit: 0.5gb
    cpus: 0.25
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoramento - 1GB total
  prometheus:
    image: prom/prometheus:latest
    container_name: leaf-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-vultr.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - leaf-network
    restart: unless-stopped
    mem_limit: 0.5gb
    cpus: 0.25

  grafana:
    image: grafana/grafana:latest
    container_name: leaf-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    networks:
      - leaf-network
    restart: unless-stopped
    mem_limit: 0.5gb
    cpus: 0.25

volumes:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:
  prometheus-data:
  grafana-data:

networks:
  leaf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16






