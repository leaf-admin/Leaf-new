# Docker Compose para Leaf WebSocket Backend
# Suporte para megacidades (1M+ usuários simultâneos)

version: '3.8'

services:
  # Redis Cluster para alta performance
  redis-master:
    image: redis:7-alpine
    container_name: leaf-redis-master
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
      - ./redis-config/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - leaf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-replica-1:
    image: redis:7-alpine
    container_name: leaf-redis-replica-1
    command: redis-server --slaveof redis-master 6379 --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis-replica-1-data:/data
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica-2:
    image: redis:7-alpine
    container_name: leaf-redis-replica-2
    command: redis-server --slaveof redis-master 6379 --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - redis-replica-2-data:/data
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy

  # Servidores WebSocket com auto-scaling
  websocket-1:
    build: .
    container_name: leaf-websocket-1
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INSTANCE_ID=websocket_1
      - CLUSTER_MODE=true
      - REDIS_URL=redis://redis-master:6379
      - REDIS_REPLICA_1=redis://redis-replica-1:6379
      - REDIS_REPLICA_2=redis://redis-replica-2:6379
    ports:
      - "3001:3001"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  websocket-2:
    build: .
    container_name: leaf-websocket-2
    environment:
      - NODE_ENV=production
      - PORT=3002
      - INSTANCE_ID=websocket_2
      - CLUSTER_MODE=true
      - REDIS_URL=redis://redis-master:6379
      - REDIS_REPLICA_1=redis://redis-replica-1:6379
      - REDIS_REPLICA_2=redis://redis-replica-2:6379
    ports:
      - "3002:3002"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  websocket-3:
    build: .
    container_name: leaf-websocket-3
    environment:
      - NODE_ENV=production
      - PORT=3003
      - INSTANCE_ID=websocket_3
      - CLUSTER_MODE=true
      - REDIS_URL=redis://redis-master:6379
      - REDIS_REPLICA_1=redis://redis-replica-1:6379
      - REDIS_REPLICA_2=redis://redis-replica-2:6379
    ports:
      - "3003:3003"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  websocket-4:
    build: .
    container_name: leaf-websocket-4
    environment:
      - NODE_ENV=production
      - PORT=3004
      - INSTANCE_ID=websocket_4
      - CLUSTER_MODE=true
      - REDIS_URL=redis://redis-master:6379
      - REDIS_REPLICA_1=redis://redis-replica-1:6379
      - REDIS_REPLICA_2=redis://redis-replica-2:6379
    ports:
      - "3004:3004"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: leaf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      - websocket-1
      - websocket-2
      - websocket-3
      - websocket-4

  # Monitoramento e métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: leaf-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - leaf-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: leaf-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    networks:
      - leaf-network
    restart: unless-stopped

volumes:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:
  prometheus-data:
  grafana-data:

networks:
  leaf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16






