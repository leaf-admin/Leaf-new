# Docker Compose para Auto-Scaling - Leaf System
# Suporte para 4 instâncias WebSocket + Redis Cluster

version: '3.8'

services:
  # Redis Master (já rodando, mas configurado aqui para referência)
  redis-master:
    image: redis:7-alpine
    container_name: leaf-redis-master
    command: |
      redis-server 
      --appendonly yes 
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru 
      --save 900 1 
      --save 300 10 
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - leaf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # WebSocket Instance 1 (Principal - sempre ativo)
  websocket-1:
    build: .
    container_name: leaf-websocket-1
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INSTANCE_ID=websocket_1
      - CLUSTER_MODE=true
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-master:6379
    ports:
      - "3001:3001"
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # WebSocket Instance 2 (Auto-scaling - inicia quando necessário)
  websocket-2:
    build: .
    container_name: leaf-websocket-2
    environment:
      - NODE_ENV=production
      - PORT=3002
      - INSTANCE_ID=websocket_2
      - CLUSTER_MODE=true
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-master:6379
    ports:
      - "3002:3002"
    networks:
      - leaf-network
    restart: "no"  # Não inicia automaticamente
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - scaling  # Só inicia com profile específico

  # WebSocket Instance 3 (Auto-scaling - inicia quando necessário)
  websocket-3:
    build: .
    container_name: leaf-websocket-3
    environment:
      - NODE_ENV=production
      - PORT=3003
      - INSTANCE_ID=websocket_3
      - CLUSTER_MODE=true
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-master:6379
    ports:
      - "3003:3003"
    networks:
      - leaf-network
    restart: "no"  # Não inicia automaticamente
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - scaling  # Só inicia com profile específico

  # WebSocket Instance 4 (Auto-scaling - inicia quando necessário)
  websocket-4:
    build: .
    container_name: leaf-websocket-4
    environment:
      - NODE_ENV=production
      - PORT=3004
      - INSTANCE_ID=websocket_4
      - CLUSTER_MODE=true
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-master:6379
    ports:
      - "3004:3004"
    networks:
      - leaf-network
    restart: "no"  # Não inicia automaticamente
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - scaling  # Só inicia com profile específico

volumes:
  redis-master-data:

networks:
  leaf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16







