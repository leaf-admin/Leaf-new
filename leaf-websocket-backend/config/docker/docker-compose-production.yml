version: '3.8'

services:
  # ===== DATABASE =====
  postgres:
    image: postgres:15-alpine
    container_name: leaf-postgres-prod
    environment:
      POSTGRES_DB: leaf_production
      POSTGRES_USER: leaf_user
      POSTGRES_PASSWORD: leaf_secure_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaf_user -d leaf_production"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: leaf-redis-prod
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== MINIO (S3 Compatible) =====
  minio:
    image: minio/minio:latest
    container_name: leaf-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: leaf_minio_user
      MINIO_ROOT_PASSWORD: leaf_minio_password_2024
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== NGINX LOAD BALANCER =====
  nginx:
    image: nginx:alpine
    container_name: leaf-nginx-prod
    volumes:
      - ./nginx-production.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - websocket-1
      - websocket-2
      - websocket-3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== WEBSOCKET SERVERS (3 INSTANCES) =====
  websocket-1:
    build: .
    container_name: leaf-websocket-1
    environment:
      NODE_ENV: production
      PORT: 3001
      WORKER_ID: 1
      POSTGRES_URL: postgresql://leaf_user:leaf_secure_password_2024@postgres:5432/leaf_production
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: leaf_minio_user
      MINIO_SECRET_KEY: leaf_minio_password_2024
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket-2:
    build: .
    container_name: leaf-websocket-2
    environment:
      NODE_ENV: production
      PORT: 3002
      WORKER_ID: 2
      POSTGRES_URL: postgresql://leaf_user:leaf_secure_password_2024@postgres:5432/leaf_production
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: leaf_minio_user
      MINIO_SECRET_KEY: leaf_minio_password_2024
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket-3:
    build: .
    container_name: leaf-websocket-3
    environment:
      NODE_ENV: production
      PORT: 3003
      WORKER_ID: 3
      POSTGRES_URL: postgresql://leaf_user:leaf_secure_password_2024@postgres:5432/leaf_production
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: leaf_minio_user
      MINIO_SECRET_KEY: leaf_minio_password_2024
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== MONITORING =====
  prometheus:
    image: prom/prometheus:latest
    container_name: leaf-prometheus-prod
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: leaf-grafana-prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: leaf_grafana_password_2024
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: leaf-production-network