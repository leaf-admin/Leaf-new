# Docker Compose Produção - Leaf System
# Configuração otimizada para produção com alta disponibilidade

version: '3.8'

services:
  # Redis Master - Cache principal
  redis-master:
    image: redis:7-alpine
    container_name: leaf-redis-master-prod
    command: |
      redis-server 
      --appendonly yes 
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru 
      --save 900 1 
      --save 300 10 
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
      --databases 16
      --rdbcompression yes
      --rdbchecksum yes
    ports:
      - "6380:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - leaf-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: '1.0'
        reservations:
          memory: 2G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  # WebSocket Instance 1 (Principal)
  websocket-1:
    build: .
    container_name: leaf-websocket-1-prod
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INSTANCE_ID=websocket_1
      - CLUSTER_MODE=true
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-master:6379
      - LOG_LEVEL=info
      - MAX_CONNECTIONS=10000
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      - redis-master
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # WebSocket Instance 2 (Escalabilidade)
  websocket-2:
    build: .
    container_name: leaf-websocket-2-prod
    environment:
      - NODE_ENV=production
      - PORT=3002
      - INSTANCE_ID=websocket_2
      - CLUSTER_MODE=true
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-master:6379
      - LOG_LEVEL=info
      - MAX_CONNECTIONS=10000
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      - redis-master
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # WebSocket Instance 3 (Escalabilidade)
    environment:
      - NODE_ENV=production
      - PORT=3003
      - INSTANCE_ID=websocket_3
      - CLUSTER_MODE=true
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-master:6379
      - LOG_LEVEL=info
      - MAX_CONNECTIONS=10000
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      - redis-master
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx Load Balancer (Produção)
  nginx:
    image: nginx:alpine
    container_name: leaf-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-production.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - leaf-network
    restart: unless-stopped
    depends_on:
      - websocket-1
      - websocket-2
      
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-master-data:
    driver: local

networks:
  leaf-network:
    driver: bridge
