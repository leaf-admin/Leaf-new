# Nginx Load Balancer - Alta Disponibilidade
# LEAF WebSocket Backend
#
# Funcionalidades:
# - Load balancing com least_conn (menos conexões)
# - Health checks automáticos
# - Failover automático
# - Rate limiting
# - WebSocket support

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=websocket:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    # Upstream - WebSocket Backend
    upstream websocket_backend {
        # Load balancing: least_conn (menos conexões)
        least_conn;
        
        # Servidores principais
        server websocket-1:3001 max_fails=3 fail_timeout=30s weight=1;
        server websocket-2:3001 max_fails=3 fail_timeout=30s weight=1;
        server websocket-3:3001 max_fails=3 fail_timeout=30s weight=1;
        
        # Servidor de backup (só usado se todos principais falharem)
        # server websocket-backup:3001 backup;
        
        # Keepalive para performance
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # Upstream - API Backend (mesmos servidores)
    upstream api_backend {
        least_conn;
        server websocket-1:3001 max_fails=3 fail_timeout=30s;
        server websocket-2:3001 max_fails=3 fail_timeout=30s;
        server websocket-3:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Server Block
    server {
        listen 80;
        server_name socket.leaf.app.br api.leaf.app.br;
        
        # Logs
        access_log /var/log/nginx/leaf_access.log main;
        error_log /var/log/nginx/leaf_error.log warn;

        # Health Check Endpoint (sem rate limit)
        location /health {
            access_log off;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Nginx Status (monitoramento)
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.20.0.0/16;  # Docker network
            deny all;
        }

        # WebSocket Endpoint
        location /socket.io/ {
            limit_req zone=websocket burst=50 nodelay;
            
            proxy_pass http://websocket_backend;
            proxy_http_version 1.1;
            
            # WebSocket Headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket Timeouts (mais longos)
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings (desabilitar para WebSocket)
            proxy_buffering off;
            proxy_cache off;
        }

        # API Endpoints
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # GraphQL Endpoint
        location /graphql {
            limit_req zone=api burst=10 nodelay;
            
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Metrics Endpoint (protegido - apenas rede interna)
        location /metrics {
            allow 127.0.0.1;
            allow 172.20.0.0/16;  # Docker network
            deny all;
            
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # Default - redirecionar para API
        location / {
            limit_req zone=general burst=10 nodelay;
            
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS Server (se SSL configurado)
    # server {
    #     listen 443 ssl http2;
    #     server_name socket.leaf.app.br api.leaf.app.br;
    #     
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     
    #     # ... mesma configuração do server acima
    # }
}

