# Nginx Load Balancer - Leaf System
# Distribui carga entre múltiplas instâncias WebSocket

upstream websocket_backend {
    # Instâncias WebSocket com balanceamento
    server websocket-1:3001 weight=3 max_fails=3 fail_timeout=30s;
    server websocket-2:3002 weight=2 max_fails=3 fail_timeout=30s;
    
    # Configurações de balanceamento
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream api_backend {
    # Instâncias API com balanceamento
    server websocket-1:3001 weight=3 max_fails=3 fail_timeout=30s;
    server websocket-2:3002 weight=2 max_fails=3 fail_timeout=30s;
    
    # Configurações de balanceamento
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate Limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=websocket:10m rate=200r/m;

server {
    listen 80;
    server_name localhost leaf.local;
    
    # Logs
    access_log /var/log/nginx/leaf_access.log;
    error_log /var/log/nginx/leaf_error.log;
    
    # Health Check endpoint
    location /health {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
    
    # API endpoints
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # WebSocket endpoints
    location /socket.io/ {
        limit_req zone=websocket burst=50 nodelay;
        
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Metrics endpoint (protegido)
    location /metrics {
        # Basic auth ou IP whitelist aqui
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Status page
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
