# Nginx Ultra-Otimizado - Leaf System
# Configurado para 500k+ usuários simultâneos

upstream websocket_ultra_backend {
    # Instâncias WebSocket ultra-otimizadas
    server websocket-ultra-1:3001 weight=4 max_fails=2 fail_timeout=10s;
    server websocket-ultra-2:3002 weight=4 max_fails=2 fail_timeout=10s;
    server websocket-ultra-3:3003 weight=4 max_fails=2 fail_timeout=10s;
    server websocket-ultra-4:3004 weight=4 max_fails=2 fail_timeout=10s;
    
    # Configurações ultra-otimizadas
    keepalive 128;
    keepalive_requests 10000;
    keepalive_timeout 300s;
    
    # Health checks
    health_check interval=5s fails=2 passes=1;
}

upstream api_ultra_backend {
    # Instâncias API ultra-otimizadas
    server websocket-ultra-1:3001 weight=4 max_fails=2 fail_timeout=10s;
    server websocket-ultra-2:3002 weight=4 max_fails=2 fail_timeout=10s;
    server websocket-ultra-3:3003 weight=4 max_fails=2 fail_timeout=10s;
    server websocket-ultra-4:3004 weight=4 max_fails=2 fail_timeout=10s;
    
    # Configurações ultra-otimizadas
    keepalive 128;
    keepalive_requests 10000;
    keepalive_timeout 300s;
}

# Rate Limiting ultra-otimizado
limit_req_zone $binary_remote_addr zone=api_ultra:50m rate=1000r/s;
limit_req_zone $binary_remote_addr zone=websocket_ultra:50m rate=2000r/s;
limit_req_zone $binary_remote_addr zone=general_ultra:50m rate=5000r/s;

# Connection Limiting ultra-otimizado
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip_ultra:50m;

# Worker processes otimizados
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    # Configurações ultra-otimizadas
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 300;
    keepalive_requests 10000;
    
    # Buffer sizes otimizados
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Timeouts otimizados
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    
    # Gzip ultra-otimizado
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80;
        server_name leaf.app.br www.leaf.app.br;
        
        # Connection Limits ultra-otimizados
        limit_conn conn_limit_per_ip_ultra 1000;
        
        # Health Check endpoint ultra-otimizado
        location /health {
            limit_req zone=general_ultra burst=1000 nodelay;
            
            proxy_pass http://api_ultra_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts ultra-otimizados
            proxy_connect_timeout 1s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
            
            # Buffer settings ultra-otimizados
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 8k;
            proxy_busy_buffers_size 16k;
        }
        
        # API endpoints ultra-otimizados
        location /api/ {
            limit_req zone=api_ultra burst=2000 nodelay;
            
            proxy_pass http://api_ultra_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts ultra-otimizados
            proxy_connect_timeout 1s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Buffer settings ultra-otimizados
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 8k;
            proxy_busy_buffers_size 16k;
        }
        
        # WebSocket endpoints ultra-otimizados
        location /socket.io/ {
            limit_req zone=websocket_ultra burst=5000 nodelay;
            
            proxy_pass http://websocket_ultra_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket specific timeouts ultra-otimizados
            proxy_connect_timeout 1s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Disable buffering for WebSocket
            proxy_buffering off;
            
            # WebSocket specific optimizations
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
        }
        
        # Metrics endpoint ultra-protegido
        location /metrics {
            # IP whitelist ultra-restritiva
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            
            proxy_pass http://api_ultra_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Status page ultra-otimizado
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
        
        # Cache estático ultra-otimizado
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
