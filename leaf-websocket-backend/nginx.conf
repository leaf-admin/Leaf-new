# Configuração Nginx para Load Balancing do Leaf System
# Suporte para megacidades (500k+ usuários simultâneos)

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Configurações de performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=websocket:10m rate=1000r/s;
    
    # Upstream para múltiplos servidores WebSocket
    upstream websocket_backend {
        # Servidor principal (atual)
        server 216.238.107.59:3001 weight=3 max_fails=3 fail_timeout=30s;
        
        # Servidores adicionais (para escalabilidade)
        server 216.238.107.59:3002 weight=2 max_fails=3 fail_timeout=30s;
        server 216.238.107.59:3003 weight=2 max_fails=3 fail_timeout=30s;
        server 216.238.107.59:3004 weight=1 max_fails=3 fail_timeout=30s;
        
        # Health check
        keepalive 32;
    }
    
    # Upstream para API REST
    upstream api_backend {
        server 216.238.107.59:3001 weight=3 max_fails=3 fail_timeout=30s;
        server 216.238.107.59:3002 weight=2 max_fails=3 fail_timeout=30s;
        
        keepalive 16;
    }
    
    # Servidor principal
    server {
        listen 80;
        server_name leaf-system.com;
        
        # Redirecionar para HTTPS
        return 301 https://$server_name$request_uri;
    }
    
    # Servidor HTTPS com Load Balancing
    server {
        listen 443 ssl http2;
        server_name leaf-system.com;
        
        # SSL Configuration
        ssl_certificate /etc/ssl/certs/leaf-system.crt;
        ssl_certificate_key /etc/ssl/private/leaf-system.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        
        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
        
        # WebSocket Load Balancing
        location /socket.io/ {
            limit_req zone=websocket burst=2000 nodelay;
            
            proxy_pass http://websocket_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket specific
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            
            # Load balancing
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }
        
        # API Load Balancing
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Health Check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Status do Nginx
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 216.238.107.59;
            deny all;
        }
        
        # Static files
        location / {
            root /var/www/leaf-system;
            try_files $uri $uri/ /index.html;
            
            # Cache static files
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}




