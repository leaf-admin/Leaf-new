version: '3.8'

services:
  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: leaf-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --requirepass leaf_redis_2024
    volumes:
      - redis_data:/data
    # Redis não precisa expor porta externamente (apenas dentro da rede Docker)
    # ports:
    #   - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - leaf-network

  # ===== WEBSOCKET SERVER =====
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leaf-websocket
    ports:
      - "3001:3001"
    environment:
      # Ambiente
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=leaf_redis_2024
      - REDIS_DB=0
      - REDIS_URL=redis://:leaf_redis_2024@redis:6379/0
      
      # Firebase (configurar via .env ou variáveis)
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-leaf-app-91dfdce0}
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL:-https://leaf-reactnative-default-rtdb.firebaseio.com}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
      
      # Woovi
      - WOOVI_WEBHOOK_URL=${WOOVI_WEBHOOK_URL:-http://147.93.66.253/api/woovi/webhook}
      - SERVER_URL=${SERVER_URL:-http://147.93.66.253}
      - WOOVI_API_TOKEN=${WOOVI_API_TOKEN}
      - WOOVI_CLIENT_ID=${WOOVI_CLIENT_ID}
      - WOOVI_CLIENT_SECRET=${WOOVI_CLIENT_SECRET}
      - WOOVI_BASE_URL=${WOOVI_BASE_URL:-https://api-sandbox.woovi.com}
      
      # API Keys
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - MAPBOX_API_KEY=${MAPBOX_API_KEY}
      - LOCATIONIQ_API_KEY=${LOCATIONIQ_API_KEY}
      
      # Segurança
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - JWT_SECRET=${JWT_SECRET:-leaf_jwt_secret_change_in_production_2024}
      
      # Monitoramento
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      
      # Leaf específico
      - LEAF_WOOVI_ACCOUNT_ID=${LEAF_WOOVI_ACCOUNT_ID}
      - LEAF_PIX_KEY=${LEAF_PIX_KEY}
      
    volumes:
      # Firebase credentials (montar arquivo JSON)
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      # Logs
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - leaf-network

  # ===== NGINX (Reverse Proxy) =====
  nginx:
    image: nginx:alpine
    container_name: leaf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      websocket:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - leaf-network

volumes:
  redis_data:
    driver: local

networks:
  leaf-network:
    driver: bridge

