# Teste Real: Login como Customer/Passageiro
# Baseado na tela real LoginScreen.js
appId: br.com.leaf.ride
---
- launchApp
- takeScreenshot: "01-app-launched"

# Se estiver deslogado, realiza login
- runFlow:
    when:
      visible: "Telefone"
    commands:
      - takeScreenshot: "02-login-screen"
      - tapOn: "Telefone"
      - inputText: "11999999999"
      - takeScreenshot: "03-phone-entered"
      - waitForAnimationToEnd
      - takeScreenshot: "04-after-phone-check"
      - runFlow:
          when:
            visible: "Senha"
          commands:
            - inputText: "senha123"
            - tapOn: "Entrar"
            - takeScreenshot: "05-login-complete"
      - runFlow:
          when:
            visible: "Nome completo"
          commands:
            - inputText: "Teste Customer"
            - tapOn: "CPF"
            - inputText: "12345678901"
            - tapOn: "Cadastrar"
            - takeScreenshot: "06-signup-complete"

# Se estiver logado, apenas registra estado atual
- runFlow:
    when:
      notVisible: "Telefone"
    commands:
      - takeScreenshot: "02-already-logged-in"

# Estado final
- takeScreenshot: "07-dashboard-visible"
