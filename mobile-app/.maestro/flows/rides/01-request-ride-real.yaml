# Teste Real: Solicitar Corrida Completa
# Baseado na NewMapScreen.js
appId: br.com.leaf.ride
---
# Assumindo que ja esta logado como customer
- launchApp
- takeScreenshot: "01-app-opened"

# Aguardar mapa carregar
- waitForAnimationToEnd
- takeScreenshot: "02-map-loaded"

# Procurar campo de origem (varias variantes de UI)
- runFlow:
    when:
      visible: "Origem"
    commands:
      - tapOn: "Origem"
      - takeScreenshot: "03-origin-tapped-origem"
- runFlow:
    when:
      visible: "De onde"
    commands:
      - tapOn: "De onde"
      - takeScreenshot: "03-origin-tapped-de-onde"
- runFlow:
    when:
      visible: "Onde você está?"
    commands:
      - tapOn: "Onde você está?"
      - takeScreenshot: "03-origin-tapped"

# Preencher origem
- inputText: "Avenida Paulista, 1000, Sao Paulo"
- waitForAnimationToEnd
- takeScreenshot: "04-origin-entered"

# Selecionar primeira sugestao (se aparecer)
- runFlow:
    when:
      visible: "Avenida Paulista"
    commands:
      - tapOn: "Avenida Paulista"
      - takeScreenshot: "05-origin-selected"

# Procurar campo de destino (varias variantes de UI)
- runFlow:
    when:
      visible: "Destino"
    commands:
      - tapOn: "Destino"
      - takeScreenshot: "06-destination-tapped-destino"
- runFlow:
    when:
      visible: "Para onde"
    commands:
      - tapOn: "Para onde"
      - takeScreenshot: "06-destination-tapped-para-onde"
- runFlow:
    when:
      visible: "Para onde você vai?"
    commands:
      - tapOn: "Para onde você vai?"
      - takeScreenshot: "06-destination-tapped"

# Preencher destino
- inputText: "Rua das Flores, 123, Sao Paulo"
- waitForAnimationToEnd
- takeScreenshot: "07-destination-entered"

# Selecionar primeira sugestao (se aparecer)
- runFlow:
    when:
      visible: "Rua das Flores"
    commands:
      - tapOn: "Rua das Flores"
      - takeScreenshot: "08-destination-selected"

# Aguardar calculo de preco
- waitForAnimationToEnd
- takeScreenshot: "09-estimate-calculating"

# Procurar botao de solicitar/agendar (varias variantes de UI)
- runFlow:
    when:
      visible: "Agendar Agora"
    commands:
      - takeScreenshot: "10-booking-button-agendar"
      - tapOn: "Agendar Agora"
- runFlow:
    when:
      visible: "Solicitar Corrida"
    commands:
      - takeScreenshot: "10-booking-button-solicitar"
      - tapOn: "Solicitar Corrida"
- runFlow:
    when:
      visible: "Pedir Agora"
    commands:
      - takeScreenshot: "10-booking-button-pedir"
      - tapOn: "Pedir Agora"
- runFlow:
    when:
      visible: "Confirmar"
    commands:
      - takeScreenshot: "10-booking-button-confirmar"
      - tapOn: "Confirmar"

# Aguardar processamento
- waitForAnimationToEnd
- takeScreenshot: "11-ride-requested"

# Captura estado final (mensagem pode variar por build)
- takeScreenshot: "12-driver-search"
